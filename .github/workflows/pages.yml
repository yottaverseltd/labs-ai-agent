name: Deploy GitHub Pages (client)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-labs-ai-agent
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      # Always rewrite client/config.json so deploy artifacts are predictable.
      # Prefer repository Variable WORKER_PUBLIC_URL; optional Secret WORKER_PUBLIC_URL if you prefer not to expose the worker URL as a variable.
      - name: Write worker base into config and index
        working-directory: client
        env:
          WORKER_FROM_VARS: ${{ vars.WORKER_PUBLIC_URL }}
          WORKER_FROM_SECRETS: ${{ secrets.WORKER_PUBLIC_URL }}
        run: |
          node <<'NODE'
          const fs = require('fs');
          const fromVar = (process.env.WORKER_FROM_VARS || '').trim();
          const fromSecret = (process.env.WORKER_FROM_SECRETS || '').trim();
          const raw = fromVar || fromSecret;
          const url = raw ? raw.replace(/\/+$/, '') : '';

          const p = 'config.json';
          const j = JSON.parse(fs.readFileSync(p, 'utf8'));
          j.workerBase = url;
          fs.writeFileSync(p, JSON.stringify(j, null, 2) + '\n');

          let html = fs.readFileSync('index.html', 'utf8');
          const replacement = url
            ? `window.__WORKER_BASE__ = window.__WORKER_BASE__ || ${JSON.stringify(url)};`
            : 'window.__WORKER_BASE__ = window.__WORKER_BASE__ || "";';
          html = html.replace(
            /window\.__WORKER_BASE__\s*=\s*window\.__WORKER_BASE__\s*\|\|\s*"";/,
            replacement
          );
          fs.writeFileSync('index.html', html);
          NODE

      - uses: actions/upload-pages-artifact@v3
        with:
          path: client

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
